<!DOCTYPE html>
<html>
<head>
  <title>Think Bank of India</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>

  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI'; }

    body {
      margin: 0;
      background: linear-gradient(135deg, #0f172a, #1e40af);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 95%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .hidden { display: none; }

    .title { font-weight: bold; margin-bottom: 10px; }

    .big { font-size: 18px; font-weight: bold; }

    .success { color: green; font-size: 30px; }

    .danger { color: red; }

    .small { font-size: 13px; color: gray; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginPage">
  <div class="title">🏦 Think Bank Login</div>

  <input id="user" placeholder="Name or Account No">
  <input id="email" placeholder="Email">

  <div class="g-recaptcha" data-sitekey="6LfI2L4sAAAAAE34fUeKy29bF5ybeeuR0Ip1Hrit"></div>

  <button onclick="sendOTP()">Send OTP</button>

  <div id="otpSection" class="hidden">
    <input id="otp" placeholder="Enter OTP">
    <button onclick="verifyOTP()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="card hidden" id="dashboard">
  <div class="title">Welcome</div>

  <button onclick="openAccount()">Account Details</button>
  <button disabled>Services (Coming Soon)</button>
</div>

<!-- PIN PAGE -->
<div class="card hidden" id="pinPage">
  <div class="title">Enter UPI PIN</div>
  <input id="pin" type="password" placeholder="Enter PIN">
  <button onclick="verifyPIN()">Verify PIN</button>
</div>

<!-- ACCOUNT DETAILS -->
<div class="card hidden" id="accountPage">
  <div class="success">✔</div>
  <h3 id="name"></h3>
  <p id="acc"></p>
  <p id="bal" class="big"></p>
  <p id="withdrawText"></p>

  <hr>

  <div class="small" id="details"></div>
</div>

<script>
let generatedOTP = "";
let otpTime = 0;
let loggedUser = null;

// SEND OTP
async function sendOTP() {
  let email = document.getElementById("email").value.trim();

  if (!grecaptcha.getResponse()) {
    alert("Complete CAPTCHA ❌");
    return;
  }

  generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
  otpTime = Date.now();

  await fetch("https://script.google.com/macros/s/AKfycbzTfkw41vJ7OUUlTyN7MLg-aZB8ULTyKmNtMcrvyqzraArFLbjXX79YHvYtSF9zOML2Ag/exec", {
    method: "POST",
    body: JSON.stringify({ email: email, otp: generatedOTP })
  });

  alert("OTP Sent 📧");
  document.getElementById("otpSection").classList.remove("hidden");
}

// VERIFY OTP
async function verifyOTP() {
  let otp = document.getElementById("otp").value;

  if (otp !== generatedOTP) {
    alert("Wrong OTP ❌");
    return;
  }

  if (Date.now() - otpTime > 120000) {
    alert("OTP expired");
    return;
  }

  let input = document.getElementById("user").value.toLowerCase().trim();
  let email = document.getElementById("email").value.toLowerCase().trim();

  let res = await fetch("https://script.google.com/macros/s/AKfycbzTfkw41vJ7OUUlTyN7MLg-aZB8ULTyKmNtMcrvyqzraArFLbjXX79YHvYtSF9zOML2Ag/exec");
  let data = await res.json();

  data.forEach(user => {
    let isNumber = !isNaN(input);
    let matchUser = isNumber 
      ? user.account_no == input 
      : user.name.toLowerCase() == input;

    if (matchUser && user.email.toLowerCase() == email) {
      loggedUser = user;
    }
  });

  if (!loggedUser) {
    alert("Invalid login ❌");
    return;
  }

  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
}

// OPEN ACCOUNT
function openAccount() {
  document.getElementById("dashboard").classList.add("hidden");
  document.getElementById("pinPage").classList.remove("hidden");
}

// VERIFY PIN
function verifyPIN() {
  let pin = document.getElementById("pin").value;

  if (pin !== loggedUser.pin) {
    alert("Wrong PIN ❌");
    return;
  }

  document.getElementById("pinPage").classList.add("hidden");
  document.getElementById("accountPage").classList.remove("hidden");

  let u = loggedUser;

  document.getElementById("name").innerText = u.name.toUpperCase();
  document.getElementById("acc").innerText = "A/C: " + u.account_no;
  document.getElementById("bal").innerText = "₹ " + u.balance;

  let withdraw = (u.withdraw || "").toLowerCase();

  let msg = document.getElementById("withdrawText");

  if (u.balance > 0 && withdraw === "yes") {
    msg.innerText = "Your balance is available to withdraw";
    msg.style.color = "green";
  } else if (u.balance > 0 && withdraw === "no") {
    msg.innerText = "Your balance is not available to withdraw";
    msg.style.color = "red";
  }

  // FULL DETAILS
  document.getElementById("details").innerHTML = `
    IFSC: ${u.ifsc}<br>
    Aadhar: ${u.aadhaar}<br>
    PAN: ${u.pan}<br>
    Phone: ${u.mobile}<br>
    Email: ${u.email}<br>
    Address: ${u.address}<br>
    Loan: ${u.loan}
  `;
}
</script>

</body>
</html>
