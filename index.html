<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Think Bank of India</title>

<!-- CAPTCHA -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#f4f6f9;
}

/* NAVBAR */
.nav{
  background:#6d28d9;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

/* LOGIN */
.login{
  max-width:400px;
  margin:80px auto;
  background:white;
  padding:20px;
  border-radius:12px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#6d28d9;
  color:white;
  margin-top:10px;
  cursor:pointer;
}

/* DASHBOARD */
.hidden{display:none;}

.cards{
  display:flex;
  gap:15px;
  padding:15px;
  flex-wrap:wrap;
}

.card{
  flex:1;
  min-width:250px;
  padding:20px;
  border-radius:18px;
  color:white;
}

.balance{
  background:linear-gradient(135deg,#9333ea,#c026d3);
}

.loan{
  background:linear-gradient(135deg,#2563eb,#1e3a8a);
}

/* ACCOUNT */
.section{
  padding:15px;
}

</style>
</head>

<body>

<div class="nav">
  <div>🏦 THINK BANK</div>
  <div onclick="logout()">Logout</div>
</div>

<!-- LOGIN -->
<div class="login" id="login">
  <h3>Login</h3>

  <input id="email" placeholder="Email">

  <!-- CAPTCHA -->
  <div class="g-recaptcha" data-sitekey="6LfI2L4sAAAAAE34fUeKy29bF5ybeeuR0Ip1Hrit"></div>

  <button onclick="sendOTP()">Send OTP</button>

  <div id="otpBox" class="hidden">
    <input id="otp" placeholder="Enter OTP">
    <button onclick="verifyOTP()">Verify</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <div style="padding:15px;font-weight:bold;" id="welcome"></div>

  <div class="cards">
    <div class="card balance">
      <p>Balance</p>
      <h2 id="bal">₹0</h2>
    </div>

    <div class="card loan">
      <p>Loan</p>
      <h2 id="loan">₹0</h2>
    </div>
  </div>

  <div class="section">
    <button onclick="openAccount()">Account Details</button>
  </div>

</div>

<!-- ACCOUNT PAGE -->
<div id="account" class="hidden section">

  <input id="pin" type="password" placeholder="Enter PIN">
  <button onclick="loadAccount()">View Details</button>

  <div id="details" class="hidden">
    <p id="name"></p>
    <p id="acc"></p>
    <p id="ifsc"></p>
    <p id="address"></p>
  </div>

</div>

<script>

let userData=null;
let token="";
const url="https://script.google.com/macros/s/AKfycbzTfkw41vJ7OUUlTyN7MLg-aZB8ULTyKmNtMcrvyqzraArFLbjXX79YHvYtSF9zOML2Ag/exec";

/* SEND OTP */
function sendOTP(){

  let email=document.getElementById("email").value;
  let captcha=grecaptcha.getResponse();

  if(!captcha){
    alert("Complete CAPTCHA ❌");
    return;
  }

  fetch(url,{
    method:"POST",
    body: JSON.stringify({
      action:"sendOTP",
      email:email,
      captcha:captcha
    })
  })
  .then(res=>res.text())
  .then(r=>{
    if(r==="CAPTCHA_FAILED"){
      alert("Captcha failed ❌");
    } else if(r==="LIMIT"){
      alert("Too many attempts ❌");
    } else {
      alert("OTP Sent 📧");
      document.getElementById("otpBox").classList.remove("hidden");
    }
  });

  grecaptcha.reset();
}

/* VERIFY OTP */
function verifyOTP(){

  let email=document.getElementById("email").value;
  let otp=document.getElementById("otp").value;

  fetch(url,{
    method:"POST",
    body: JSON.stringify({
      action:"verifyOTP",
      email:email,
      otp:otp
    })
  })
  .then(res=>res.text())
  .then(t=>{
    if(t==="INVALID_OTP"){
      alert("Wrong OTP ❌");
      return;
    }

    token=t;
    loadDashboard(email);
  });
}

/* LOAD DASHBOARD */
function loadDashboard(email){

  document.getElementById("login").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  fetch(url)
  .then(res=>res.json())
  .then(data=>{
    data.forEach(u=>{
      if(u.email===email){
        userData=u;

        document.getElementById("welcome").innerText="Welcome "+u.name;

        document.getElementById("bal").innerText="₹"+u.balance;
        document.getElementById("loan").innerText="₹"+(u.loan||0);
      }
    });
  });
}

/* ACCOUNT PAGE */
function openAccount(){
  document.getElementById("dashboard").classList.add("hidden");
  document.getElementById("account").classList.remove("hidden");
}

/* LOAD ACCOUNT */
function loadAccount(){

  let pin=document.getElementById("pin").value;

  if(pin!==userData.pin){
    alert("Wrong PIN ❌");
    return;
  }

  document.getElementById("details").classList.remove("hidden");

  document.getElementById("name").innerText=userData.name;
  document.getElementById("acc").innerText="A/C: "+userData.account_no;
  document.getElementById("ifsc").innerText="IFSC: "+userData.ifsc;
  document.getElementById("address").innerText=userData.address;
}

/* LOGOUT */
function logout(){
  location.reload();
}

</script>

</body>
</html>
