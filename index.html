<!DOCTYPE html>
<html>
<head>
  <title>Think Bank of India</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #0f172a, #1e40af);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      background: #2563eb;
      color: white;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 8px;
      margin-top: 8px;
    }

    .result {
      margin-top: 10px;
      display: none;
    }
  </style>
</head>

<body>

<div class="card">
  <h3>🏦 Think Bank</h3>

  <input id="user" placeholder="Name or Account No">
  <input id="email" placeholder="Email">

  <button onclick="sendOTP()">Send OTP</button>

  <input id="otp" placeholder="Enter OTP">
  <input id="pin" placeholder="PIN" type="password">

  <button onclick="checkBalance()">Check Balance</button>

  <div class="result" id="result">
    <h4 id="name"></h4>
    <p id="acc"></p>
    <p id="bal"></p>
  </div>
</div>

<script>
let generatedOTP = "";

async function sendOTP() {
  let email = document.getElementById("email").value;

  if (!email) {
    alert("Enter email ❌");
    return;
  }

  generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();

  await fetch("YOUR_SCRIPT_URL", {
    method: "POST",
    body: JSON.stringify({
      email: email,
      otp: generatedOTP
    })
  });

  alert("OTP sent to email 📧");
}

async function checkBalance() {
  let input = document.getElementById("user").value.toLowerCase();
  let email = document.getElementById("email").value;
  let pin = document.getElementById("pin").value;
  let otp = document.getElementById("otp").value;

  if (otp !== generatedOTP) {
    alert("Wrong OTP ❌");
    return;
  }

  let res = await fetch("https://script.google.com/macros/s/AKfycbyx_jOeBFaMljpWID6_49evio8z6IeMN6y6lAUfLaydnAGhp2JLv-6FmYf4xwzKxrAbUw/exec");
  let data = await res.json();

  data.forEach(user => {
    if (
      (user.account_no.toString() == input || user.name.toLowerCase() == input) &&
      user.email == email &&
      user.pin == pin
    ) {
      document.getElementById("name").innerText = user.name.toUpperCase();
      document.getElementById("acc").innerText = "Account: " + user.account_no;
      document.getElementById("bal").innerText = "Balance: ₹" + user.balance;

      document.getElementById("result").style.display = "block";
    }
  });
}
</script>

</body>
</html>
