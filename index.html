<!DOCTYPE html>
<html>
<head>
  <title>Think Bank of India</title>

  <!-- Google reCAPTCHA -->
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #0f172a, #1e40af);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      background: #2563eb;
      color: white;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 8px;
      margin-top: 8px;
      cursor: pointer;
    }

    button:disabled {
      background: gray;
    }

    #timerText {
      font-size: 12px;
      color: gray;
    }

    .result {
      margin-top: 10px;
      display: none;
    }
  </style>
</head>

<body>

<div class="card">
  <h3>🏦 Think Bank</h3>

  <input id="user" placeholder="Name or Account No">
  <input id="email" placeholder="Email">

  <!-- CAPTCHA -->
  <div class="g-recaptcha" data-sitekey="6LfI2L4sAAAAAE34fUeKy29bF5ybeeuR0Ip1Hrit"></div>

  <button id="otpBtn" onclick="sendOTP()">Send OTP</button>
  <p id="timerText"></p>

  <input id="otp" placeholder="Enter OTP">

  <button onclick="checkBalance()">Check Balance</button>

  <div class="result" id="result">
    <h4 id="name"></h4>
    <p id="acc"></p>
    <p id="bal"></p>
  </div>
</div>

<script>
let generatedOTP = "";
let otpTime = 0;
let countdown = 60;
let timerInterval = null;

// 🔐 SEND OTP
async function sendOTP() {
  let email = document.getElementById("email").value.trim();

  let captcha = grecaptcha.getResponse();
  if (!captcha) {
    alert("Please verify CAPTCHA ❌");
    return;
  }

  if (!email) {
    alert("Enter email ❌");
    return;
  }

  generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
  otpTime = Date.now();
  countdown = 60;

  await fetch("https://script.google.com/macros/s/AKfycbzTfkw41vJ7OUUlTyN7MLg-aZB8ULTyKmNtMcrvyqzraArFLbjXX79YHvYtSF9zOML2Ag/exec", {
    method: "POST",
    body: JSON.stringify({
      email: email,
      otp: generatedOTP
    })
  });

  alert("OTP sent to email 📧");
  startTimer();
}

// ⏱️ TIMER
function startTimer() {
  let timerText = document.getElementById("timerText");
  let btn = document.getElementById("otpBtn");

  btn.disabled = true;

  clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    if (countdown <= 0) {
      clearInterval(timerInterval);
      timerText.innerText = "Resend OTP 🔁";
      btn.disabled = false;
    } else {
      timerText.innerText = "Resend in " + countdown + " sec";
      countdown--;
    }
  }, 1000);
}

// 💰 CHECK BALANCE
async function checkBalance() {
  let input = document.getElementById("user").value.toLowerCase().trim();
  let email = document.getElementById("email").value.toLowerCase().trim();
  let otp = document.getElementById("otp").value.trim();

  if (Date.now() - otpTime > 120000) {
    alert("OTP expired ⏱️");
    return;
  }

  if (otp !== generatedOTP) {
    alert("Wrong OTP ❌");
    return;
  }

  let res = await fetch("https://script.google.com/macros/s/AKfycbzTfkw41vJ7OUUlTyN7MLg-aZB8ULTyKmNtMcrvyqzraArFLbjXX79YHvYtSF9zOML2Ag/exec");
  let data = await res.json();

  let found = false;

  data.forEach(user => {
    let userName = user.name.toLowerCase().trim();
    let userEmail = user.email.toLowerCase().trim();
    let userAcc = user.account_no.toString().trim();

    let isNumber = !isNaN(input);

    let matchUser = false;

    if (isNumber) {
      matchUser = (userAcc === input);
    } else {
      matchUser = (userName === input);
    }

    let matchEmail = (userEmail === email);

    if (matchUser && matchEmail) {
      document.getElementById("name").innerText = user.name.toUpperCase();
      document.getElementById("acc").innerText = "Account: " + user.account_no;
      document.getElementById("bal").innerText = "Balance: ₹" + user.balance;

      document.getElementById("result").style.display = "block";
      found = true;
    }
  });

  if (!found) {
    alert("Invalid details ❌");
  }

  // 🔥 CAPTCHA clear after check
  grecaptcha.reset();
}
</script>

</body>
</html>
