<!DOCTYPE html>
<html>
<head>
  <title>Think Bank of India</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: #f1f5f9;
    }

    .navbar {
      background: #1e40af;
      color: white;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      margin-top: 8px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .hidden { display: none; }

    .label { font-size: 12px; color: gray; }
    .value { font-weight: bold; }

    .timer { font-size: 12px; color: gray; }

    .logout {
      cursor: pointer;
      font-size: 14px;
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar hidden" id="navbar">
  <div>🏦 TBI Banking</div>
  <div class="logout" onclick="logout()">Logout</div>
</div>

<div class="container">

<!-- LOGIN -->
<div id="loginPage" class="card">
  <h3>Login</h3>

  <input id="user" placeholder="Name or Account No">
  <input id="email" placeholder="Email">

  <div class="g-recaptcha" data-sitekey="6LfI2L4sAAAAAE34fUeKy29bF5ybeeuR0Ip1Hrit"></div>

  <button id="otpBtn" onclick="sendOTP()">Send OTP</button>
  <p id="timer" class="timer"></p>

  <div id="otpBox" class="hidden">
    <input id="otp" placeholder="Enter OTP">
    <button onclick="verifyOTP()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
  <div class="card">
    <h3>Dashboard</h3>

    <div class="grid">
      <button onclick="openAccount()">Account Details</button>
      <button disabled>Services</button>
    </div>
  </div>
</div>

<!-- PIN PAGE -->
<div id="pinPage" class="hidden">
  <div class="card">
    <h3>Enter PIN</h3>
    <input id="pin" type="password" placeholder="Enter PIN">
    <button onclick="togglePin()">Show/Hide PIN</button>
    <button onclick="verifyPIN()">Verify</button>
  </div>
</div>

<!-- ACCOUNT DETAILS -->
<div id="accountPage" class="hidden">

  <div class="card">
    <h3>Account Summary</h3>
    <p><b id="name"></b></p>
    <p id="acc"></p>
    <p id="bal"></p>
    <p id="withdrawText"></p>
  </div>

  <div class="card">
    <h4>Personal Details</h4>
    <p class="label">Aadhar</p><p class="value" id="aadhaar"></p>
    <p class="label">PAN</p><p class="value" id="pan"></p>
    <p class="label">Phone</p><p class="value" id="phone"></p>
    <p class="label">Email</p><p class="value" id="mail"></p>
    <p class="label">Address</p><p class="value" id="address"></p>
  </div>

  <div class="card">
    <h4>Bank Details</h4>
    <p class="label">IFSC</p><p class="value" id="ifsc"></p>
    <p class="label">Account Type</p><p class="value" id="type"></p>
    <p class="label">CIF No</p><p class="value" id="cif"></p>
    <p class="label">KYC</p><p class="value" id="kyc"></p>
    <p class="label">TIN No</p><p class="value" id="tin"></p>
    <p class="label">TBI Card</p><p class="value" id="card"></p>
    <p class="label">Loan</p><p class="value" id="loan"></p>
  </div>

</div>

</div>

<script>
let otp = "";
let otpTime = 0;
let timerInt;
let userData = null;

// OTP SEND
async function sendOTP() {
  let email = document.getElementById("email").value;

  if (!grecaptcha.getResponse()) {
    alert("Complete CAPTCHA");
    return;
  }

  otp = Math.floor(100000 + Math.random()*900000).toString();
  otpTime = Date.now();

  await fetch("https://script.google.com/macros/s/AKfycbzTfkw41vJ7OUUlTyN7MLg-aZB8ULTyKmNtMcrvyqzraArFLbjXX79YHvYtSF9zOML2Ag/exec", {
    method: "POST",
    body: JSON.stringify({email: email, otp: otp})
  });

  document.getElementById("otpBox").classList.remove("hidden");

  startTimer();
}

// TIMER
function startTimer() {
  let t = 60;
  let el = document.getElementById("timer");

  clearInterval(timerInt);

  timerInt = setInterval(()=>{
    if(t<=0){
      el.innerText = "Resend OTP";
      document.getElementById("otpBtn").disabled = false;
      clearInterval(timerInt);
    } else {
      el.innerText = "Resend in "+t+" sec";
      document.getElementById("otpBtn").disabled = true;
      t--;
    }
  },1000);
}

// VERIFY OTP
async function verifyOTP() {
  if(document.getElementById("otp").value !== otp){
    alert("Wrong OTP");
    return;
  }

  let input = document.getElementById("user").value.toLowerCase();
  let email = document.getElementById("email").value.toLowerCase();

  let res = await fetch("https://script.google.com/macros/s/AKfycbzTfkw41vJ7OUUlTyN7MLg-aZB8ULTyKmNtMcrvyqzraArFLbjXX79YHvYtSF9zOML2Ag/exec");
  let data = await res.json();

  data.forEach(u=>{
    let isNum = !isNaN(input);
    let match = isNum ? u.account_no==input : u.name.toLowerCase()==input;

    if(match && u.email.toLowerCase()==email){
      userData = u;
    }
  });

  if(!userData){
    alert("Invalid login");
    return;
  }

  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
  document.getElementById("navbar").classList.remove("hidden");
}

// ACCOUNT
function openAccount(){
  document.getElementById("dashboard").classList.add("hidden");
  document.getElementById("pinPage").classList.remove("hidden");
}

// PIN
function verifyPIN(){
  if(document.getElementById("pin").value !== userData.pin){
    alert("Wrong PIN");
    return;
  }

  let u = userData;

  document.getElementById("pinPage").classList.add("hidden");
  document.getElementById("accountPage").classList.remove("hidden");

  document.getElementById("name").innerText = u.name;
  document.getElementById("acc").innerText = "A/C: "+u.account_no;
  document.getElementById("bal").innerText = "Balance: ₹"+u.balance;

  document.getElementById("aadhaar").innerText = u.aadhaar;
  document.getElementById("pan").innerText = u.pan;
  document.getElementById("phone").innerText = u.mobile;
  document.getElementById("mail").innerText = u.email;
  document.getElementById("address").innerText = u.address;

  document.getElementById("ifsc").innerText = u.ifsc;
  document.getElementById("type").innerText = u.account_type;
  document.getElementById("cif").innerText = u.cif;
  document.getElementById("kyc").innerText = u.kyc;
  document.getElementById("tin").innerText = u.tin;
  document.getElementById("card").innerText = u.card;
  document.getElementById("loan").innerText = u.loan;

  if(u.balance>0 && u.withdraw.toLowerCase()=="yes"){
    document.getElementById("withdrawText").innerText="Withdraw Available";
  } else {
    document.getElementById("withdrawText").innerText="";
  }
}

// PIN SHOW
function togglePin(){
  let p=document.getElementById("pin");
  p.type = p.type==="password"?"text":"password";
}

// LOGOUT
function logout(){
  location.reload();
}
</script>

</body>
</html>
