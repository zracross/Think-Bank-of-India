<!DOCTYPE html>
<html>
<head>
  <title>Think Bank of India</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #0f172a, #1e40af);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      background: #2563eb;
      color: white;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 8px;
      margin-top: 8px;
    }

    #timerText {
      font-size: 12px;
      color: gray;
    }

    .result {
      margin-top: 10px;
      display: none;
    }
  </style>
</head>

<body>

<div class="card">
  <h3>🏦 Think Bank</h3>

  <input id="user" placeholder="Name or Account No">
  <input id="email" placeholder="Email">

  <!-- CAPTCHA -->
  <div id="captchaQ"></div>
  <input id="captchaAns" placeholder="Enter CAPTCHA">

  <button id="otpBtn" onclick="sendOTP()">Send OTP</button>
  <p id="timerText"></p>

  <input id="otp" placeholder="Enter OTP">

  <button onclick="checkBalance()">Check Balance</button>

  <div class="result" id="result">
    <h4 id="name"></h4>
    <p id="acc"></p>
    <p id="bal"></p>
  </div>
</div>

<script>
let generatedOTP = "";
let otpTime = 0;
let countdown = 60;
let timerInterval = null;

let captchaAnswer = 0;

// 🔢 CAPTCHA
function generateCaptcha() {
  let a = Math.floor(Math.random() * 10);
  let b = Math.floor(Math.random() * 10);
  captchaAnswer = a + b;

  document.getElementById("captchaQ").innerText =
    "Solve: " + a + " + " + b;
}
generateCaptcha();

// 🔐 SEND OTP
async function sendOTP() {
  let email = document.getElementById("email").value;
  let cap = document.getElementById("captchaAns").value;

  // CAPTCHA check BEFORE OTP
  if (parseInt(cap) !== captchaAnswer) {
    alert("Wrong CAPTCHA ❌");
    generateCaptcha();
    return;
  }

  if (!email) {
    alert("Enter email ❌");
    return;
  }

  generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
  otpTime = Date.now();
  countdown = 60;

  await fetch("https://script.google.com/macros/s/AKfycbzTfkw41vJ7OUUlTyN7MLg-aZB8ULTyKmNtMcrvyqzraArFLbjXX79YHvYtSF9zOML2Ag/exec", {
    method: "POST",
    body: JSON.stringify({
      email: email,
      otp: generatedOTP
    })
  });

  alert("OTP sent 📧");
  startTimer();
}

// ⏱️ TIMER
function startTimer() {
  let timerText = document.getElementById("timerText");
  let btn = document.getElementById("otpBtn");

  btn.disabled = true;

  clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    if (countdown <= 0) {
      clearInterval(timerInterval);
      timerText.innerText = "Resend OTP 🔁";
      btn.disabled = false;
    } else {
      timerText.innerText = "Resend in " + countdown + " sec";
      countdown--;
    }
  }, 1000);
}

// 💰 CHECK BALANCE
async function checkBalance() {
  let input = document.getElementById("user").value.toLowerCase().trim();
  let email = document.getElementById("email").value.trim();
  let otp = document.getElementById("otp").value;

  if (Date.now() - otpTime > 120000) {
    alert("OTP expired ⏱️");
    return;
  }

  if (otp !== generatedOTP) {
    alert("Wrong OTP ❌");
    return;
  }

  let res = await fetch("https://script.google.com/macros/s/AKfycbzTfkw41vJ7OUUlTyN7MLg-aZB8ULTyKmNtMcrvyqzraArFLbjXX79YHvYtSF9zOML2Ag/exec");
  let data = await res.json();

  data.forEach(user => {
    if (
      (user.account_no.toString() == input || user.name.toLowerCase() == input) &&
      user.email == email
    ) {
      document.getElementById("name").innerText = user.name.toUpperCase();
      document.getElementById("acc").innerText = "Account: " + user.account_no;
      document.getElementById("bal").innerText = "Balance: ₹" + user.balance;

      document.getElementById("result").style.display = "block";
    }
  });
}
</script>

</body>
</html>
