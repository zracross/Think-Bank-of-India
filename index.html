<!DOCTYPE html>
<html>
<head>
  <title>Think Bank of India</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #0f172a, #1e40af);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 95%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    #timerText {
      font-size: 12px;
      color: gray;
    }

    #otpSection {
      display: none;
    }

    #result {
      display: none;
      margin-top: 10px;
    }

    #bal {
      font-weight: bold;
      font-size: 18px;
      color: green;
    }
  </style>
</head>

<body>

<div class="card">
  <h3>🏦 Think Bank</h3>

  <input id="user" placeholder="Name or Account No">
  <input id="email" placeholder="Email">

  <div class="g-recaptcha" data-sitekey="6LfI2L4sAAAAAE34fUeKy29bF5ybeeuR0Ip1Hrit"></div>

  <button id="otpBtn" onclick="sendOTP()">Send OTP</button>
  <p id="timerText"></p>

  <!-- OTP Section -->
  <div id="otpSection">
    <input id="otp" placeholder="Enter OTP">
    <button onclick="checkBalance()">Check Balance</button>
  </div>

  <!-- Result -->
  <div id="result">
    <h4 id="name"></h4>
    <p id="acc"></p>
    <p id="bal"></p>
    <p id="withdrawText"></p>
  </div>
</div>

<script>
let generatedOTP = "";
let otpTime = 0;

// SEND OTP
async function sendOTP() {
  let email = document.getElementById("email").value.trim();

  if (!grecaptcha.getResponse()) {
    alert("Complete CAPTCHA ❌");
    return;
  }

  if (!email) {
    alert("Enter email ❌");
    return;
  }

  generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
  otpTime = Date.now();

  await fetch("https://script.google.com/macros/s/AKfycbzTfkw41vJ7OUUlTyN7MLg-aZB8ULTyKmNtMcrvyqzraArFLbjXX79YHvYtSF9zOML2Ag/exec", {
    method: "POST",
    body: JSON.stringify({ email: email, otp: generatedOTP })
  });

  alert("OTP Sent 📧");

  // SHOW OTP BOX
  document.getElementById("otpSection").style.display = "block";
}

// CHECK BALANCE
async function checkBalance() {
  let input = document.getElementById("user").value.toLowerCase().trim();
  let email = document.getElementById("email").value.toLowerCase().trim();
  let otp = document.getElementById("otp").value.trim();

  if (Date.now() - otpTime > 120000) {
    alert("OTP expired ⏱️");
    return;
  }

  if (otp !== generatedOTP) {
    alert("Wrong OTP ❌");
    return;
  }

  let res = await fetch("https://script.google.com/macros/s/AKfycbzTfkw41vJ7OUUlTyN7MLg-aZB8ULTyKmNtMcrvyqzraArFLbjXX79YHvYtSF9zOML2Ag/exec");
  let data = await res.json();

  let found = false;

  data.forEach(user => {
    let name = user.name.toLowerCase().trim();
    let mail = user.email.toLowerCase().trim();
    let acc = user.account_no.toString().trim();

    let isNumber = !isNaN(input);
    let matchUser = isNumber ? acc === input : name === input;

    if (matchUser && mail === email) {
      let bal = parseFloat(user.balance);
      let withdraw = (user.withdraw || "").toLowerCase().trim();

      document.getElementById("name").innerText = user.name.toUpperCase();
      document.getElementById("acc").innerText = "Account: " + acc;
      document.getElementById("bal").innerText = "Balance: ₹" + bal;

      let msg = document.getElementById("withdrawText");

      if (bal > 0 && withdraw === "yes") {
        msg.innerText = "✔ Your balance is able to withdraw";
        msg.style.color = "green";
      } 
      else if (bal > 0 && withdraw === "no") {
        msg.innerText = "✖ Your balance is not able to withdraw";
        msg.style.color = "red";
      } 
      else {
        msg.innerText = "";
      }

      document.getElementById("result").style.display = "block";
      found = true;
    }
  });

  if (!found) {
    alert("Invalid details ❌");
  }

  grecaptcha.reset();
}
</script>

</body>
</html>
